name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test (slatrap-engine)
        run: npm run test:slatrap-engine

      - name: Test (slatrap)
        run: npm run test:slatrap

      - name: Build publishable package (slatrap)
        run: npm run build:slatrap

      - name: Verify npm pack contents
        working-directory: packages/slatrap
        run: npm pack --dry-run

      - name: Build
        run: npm run build
